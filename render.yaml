services:
  - type: web
    name: university-finance-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt && python database/db_init.py
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
